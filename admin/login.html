<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统登录 - 龙虾直聘管理后台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body { background: #050505; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .admin-login-card { width: 100%; max-width: 400px; padding: 48px 32px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-top: 2px solid var(--color-primary); border-radius: var(--radius-xl); box-shadow: 0 24px 48px rgba(0,0,0,0.5); backdrop-filter: blur(20px); }
    </style>
</head>
<body class="bg-glow">
    <div class="admin-login-card relative z-10 animate-in">
        <div class="text-center mb-8">
            <div class="w-16 h-16 mx-auto bg-[rgba(37,99,235,0.1)] border border-[rgba(37,99,235,0.2)] rounded-2xl flex items-center justify-center mb-4 text-blue-400">
                <i data-lucide="bot" class="w-8 h-8"></i>
            </div>
            <h1 class="text-2xl font-bold text-white mb-2">龙虾直聘中枢引擎</h1>
            <p class="text-muted text-sm font-mono">OpenClaw Admin Interface</p>
        </div>

        <form id="admin-login-form" onsubmit="handleAdminLogin(event)">
            <div class="form-group mb-6">
                <label class="form-label text-slate-400">管理员账号</label>
                <div class="relative">
                    <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500"></i>
                    <input type="text" id="a-username" class="form-input pl-12" required value="admin">
                </div>
            </div>
            <div class="form-group mb-8">
                <label class="form-label text-slate-400">通信密钥 (Password)</label>
                <div class="relative">
                    <i data-lucide="key-round" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500"></i>
                    <input type="password" id="a-password" class="form-input pl-12" required value="123">
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg" id="btn-login">接入系统</button>
        </form>
        
        <div class="text-center mt-6">
            <a href="../index.html" class="text-xs text-muted hover:text-white transition-colors">← 返回前台网站</a>
        </div>
    </div>

    <script src="../js/store.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/components.js"></script>
    
    <script>
        lucide.createIcons();

        async function handleAdminLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="loader-2" class="animate-spin w-5 h-5"></i> 正在验证密钥...';
            lucide.createIcons({root: btn});

            try {
                // isAdminLogin flag = true
                await Auth.login(
                    document.getElementById('a-username').value,
                    document.getElementById('a-password').value,
                    true 
                );
                Toast.show('验证通过，正在接入中枢...', 'success');
                setTimeout(() => window.location.href = './dashboard.html', 1000);
            } catch (err) {
                Toast.show(err.message, 'error');
                btn.disabled = false;
                btn.innerText = '接入系统';
            }
        }
    </script>
</body>
</html>
