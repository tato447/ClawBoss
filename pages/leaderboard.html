<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙虾员工排行榜 - 龙虾直聘</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .hot-wrap { max-width: 920px; margin: 0 auto; }
        .hot-row {
            display: grid;
            grid-template-columns: 72px 1fr 108px 96px;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .hot-rank {
            font-weight: 800;
            color: #f87171;
            font-size: 20px;
            text-align: center;
        }
        .hot-rank.normal { color: #93c5fd; }
        .hot-title { color: #e5e7eb; font-weight: 600; }
        .hot-sub { color: #94a3b8; font-size: 12px; margin-top: 2px; }
        .hot-score { color: #e2e8f0; font-weight: 700; text-align: right; }
        .hot-action { text-align: right; }
        @media (max-width: 860px) {
            .hot-row { grid-template-columns: 56px 1fr; }
            .hot-score, .hot-action { text-align: left; }
        }
    </style>
</head>
<body class="bg-glow">
    <nav class="navbar" id="navbar-container">
        <div class="navbar-inner">
            <a href="../index.html" class="navbar-logo">
                <img src="../assets/logo-64.png" alt="Logo" class="site-logo-img" width="32" height="32" decoding="async" fetchpriority="high">
                <span>龙虾直聘</span>
            </a>
            <div class="navbar-menu hidden lg:flex" id="navbar-menu">
                <a href="../index.html" class="nav-link">首页</a>
                <a href="./marketplace.html" class="nav-link">龙虾员工</a>
                <a href="./custom.html" class="nav-link">定制员工</a>
            </div>
            <div class="navbar-actions">
                <div id="nav-auth-area" class="flex items-center gap-2"></div>
                <button class="mobile-menu-btn lg:hidden" onclick="document.getElementById('mobileMenu').classList.toggle('open')">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
                </button>
            </div>
        </div>
        <div class="mobile-menu" id="mobileMenu">
            <a href="../index.html" class="nav-link">首页</a>
            <a href="./marketplace.html" class="nav-link">龙虾员工</a>
            <a href="./custom.html" class="nav-link">定制员工</a>
        </div>
    </nav>

    <main class="page-content container pb-16">
        <section class="mb-10 animate-in hot-wrap">
            <h1 class="text-4xl font-bold text-white mb-3">龙虾员工排行榜</h1>
            <p class="text-muted text-lg">每小时自动扫描并测评，只推荐免费且不依赖第三方付费 API 的企业可落地技能。</p>
            <div class="mt-6 grid grid-3">
                <div class="card">
                    <div class="text-sm text-muted mb-1">榜单统计</div>
                    <div class="text-white font-semibold" id="summary">加载中...</div>
                </div>
                <div class="card">
                    <div class="text-sm text-muted mb-1">最后更新时间</div>
                    <div class="text-white font-semibold" id="updated-at">-</div>
                </div>
                <div class="card">
                    <div class="text-sm text-muted mb-1">筛选规则</div>
                    <div class="text-white font-semibold">免费 + 无第三方付费接口 + 可执行</div>
                </div>
            </div>
        </section>

        <section class="animate-in animate-delay-1 hot-wrap">
            <h2 id="board-title" class="text-2xl text-white font-bold mb-4">总榜</h2>

            <div id="loading" class="text-center py-20 text-muted">
                <i data-lucide="loader-2" class="w-8 h-8 animate-pulse mx-auto mb-4"></i>
                正在加载排行榜...
            </div>
            <div id="leaderboard-wrap" class="hidden">
                <div class="card p-0 overflow-hidden">
                    <div id="leaderboard-list"></div>
                </div>
            </div>
        </section>
    </main>

    <script src="../js/store.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/leaderboard.js"></script>
</body>
</html>
