<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙虾员工排行榜 - 龙虾直聘</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .rank-card .rank-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
        .rank-no {
            min-width: 50px; height: 50px; border-radius: 12px;
            background: linear-gradient(135deg, rgba(239,68,68,0.22), rgba(37,99,235,0.2));
            border: 1px solid rgba(255,255,255,0.12);
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: 800;
        }
        .rank-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .board-tabs { display: flex; flex-wrap: wrap; gap: 8px; }
        .board-tab {
            padding: 8px 14px; border-radius: 9999px;
            border: 1px solid rgba(255,255,255,0.1);
            color: #94a3b8; background: rgba(255,255,255,0.03); cursor: pointer;
        }
        .board-tab.active { color: #fff; border-color: rgba(59,130,246,0.65); background: rgba(59,130,246,0.2); }
        .badge-red {
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.35);
            color: #fca5a5;
        }
        @media (max-width: 900px) { .rank-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body class="bg-glow">
    <nav class="navbar" id="navbar-container">
        <div class="navbar-inner">
            <a href="../index.html" class="navbar-logo">
                <img src="../assets/logo-64.png" alt="Logo" class="site-logo-img" width="32" height="32" decoding="async" fetchpriority="high">
                <span>龙虾直聘</span>
            </a>
            <div class="navbar-menu hidden lg:flex" id="navbar-menu">
                <a href="../index.html" class="nav-link">首页</a>
                <a href="./marketplace.html" class="nav-link">龙虾员工</a>
                <a href="./leaderboard.html" class="nav-link">排行榜</a>
                <a href="./custom.html" class="nav-link">定制员工</a>
            </div>
            <div class="navbar-actions">
                <div id="nav-auth-area" class="flex items-center gap-2"></div>
                <button class="mobile-menu-btn lg:hidden" onclick="document.getElementById('mobileMenu').classList.toggle('open')">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
                </button>
            </div>
        </div>
        <div class="mobile-menu" id="mobileMenu">
            <a href="../index.html" class="nav-link">首页</a>
            <a href="./marketplace.html" class="nav-link">龙虾员工</a>
            <a href="./leaderboard.html" class="nav-link">排行榜</a>
            <a href="./custom.html" class="nav-link">定制员工</a>
        </div>
    </nav>

    <main class="page-content container pb-16">
        <section class="mb-10 animate-in">
            <h1 class="text-4xl font-bold text-white mb-3">龙虾员工排行榜</h1>
            <p class="text-muted text-lg">每小时自动扫描并测评，只推荐免费且不依赖第三方付费 API 的企业可落地技能。</p>
            <div class="mt-6 grid grid-3">
                <div class="card">
                    <div class="text-sm text-muted mb-1">榜单统计</div>
                    <div class="text-white font-semibold" id="summary">加载中...</div>
                </div>
                <div class="card">
                    <div class="text-sm text-muted mb-1">最后更新时间</div>
                    <div class="text-white font-semibold" id="updated-at">-</div>
                </div>
                <div class="card">
                    <div class="text-sm text-muted mb-1">筛选规则</div>
                    <div class="text-white font-semibold">免费 + 无第三方付费接口 + 可执行</div>
                </div>
            </div>
        </section>

        <section class="animate-in animate-delay-1">
            <div class="board-tabs mb-4">
                <button class="board-tab active" data-board="overall">总榜</button>
                <button class="board-tab" data-board="marketing">营销/内容</button>
                <button class="board-tab" data-board="sales">销售增长</button>
                <button class="board-tab" data-board="service">客户服务</button>
                <button class="board-tab" data-board="data">数据分析</button>
                <button class="board-tab" data-board="automation">自动化</button>
            </div>
            <h2 id="board-title" class="text-2xl text-white font-bold mb-4">总榜</h2>

            <div id="loading" class="text-center py-20 text-muted">
                <i data-lucide="loader-2" class="w-8 h-8 animate-pulse mx-auto mb-4"></i>
                正在加载排行榜...
            </div>
            <div id="leaderboard-wrap" class="hidden">
                <div id="leaderboard-list" class="grid gap-4"></div>
            </div>
        </section>
    </main>

    <script src="../js/store.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/leaderboard.js"></script>
</body>
</html>
