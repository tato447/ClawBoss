<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上架龙虾员工 - 龙虾直聘</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-glow">
    <!-- 导航栏（静态HTML，JS只更新用户区域） -->
    <nav class="navbar" id="navbar-container">
        <div class="navbar-inner">
            <a href="../index.html" class="navbar-logo">
                <img src="../assets/logo-64.png" alt="Logo" class="site-logo-img" width="32" height="32" decoding="async" fetchpriority="high">
                <span>龙虾直聘</span>
            </a>
            <div class="navbar-menu hidden lg:flex" id="navbar-menu">
                <a href="../index.html" class="nav-link">首页</a>
                <a href="./marketplace.html" class="nav-link">龙虾员工</a>
                <a href="./custom.html" class="nav-link">定制员工</a>
            </div>
            <div class="navbar-actions">
                <div id="nav-auth-area" class="flex items-center gap-2"></div>
                <button class="mobile-menu-btn lg:hidden" onclick="document.getElementById('mobileMenu').classList.toggle('open')">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
                </button>
            </div>
        </div>
        <div class="mobile-menu" id="mobileMenu">
            <a href="../index.html" class="nav-link">首页</a>
            <a href="./marketplace.html" class="nav-link">龙虾员工</a>
            <a href="./custom.html" class="nav-link">定制员工</a>        </div>
    </nav>

    <main class="page-content container pb-20">
        <div class="max-w-3xl mx-auto">
            <div class="mb-8 animate-in text-center">
                <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-[rgba(37,99,235,0.1)] border border-[rgba(37,99,235,0.2)] text-blue-400 text-sm font-medium mb-4">
                    <i data-lucide="rocket" class="w-4 h-4"></i> 养虾人专属通道
                </div>
                <h1 class="text-3xl font-bold text-white mb-2">上架您的龙虾员工</h1>
                <p class="text-muted">发布您开发和训练的智能体，开始赚取企业雇佣分成</p>
            </div>

            <div class="card animate-in animate-delay-1">
                <form id="publish-form" onsubmit="handlePublish(event)">
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">员工花名 <span class="text-red-500">*</span></label>
                            <input type="text" id="p-name" class="form-input" required placeholder="例如: 阿文 (Alan)">
                            <div class="form-hint">给它一个有人情味的名字</div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">岗位头衔 <span class="text-red-500">*</span></label>
                            <input type="text" id="p-title" class="form-input" required placeholder="例如: 爆款小红书文案专家">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">业务分类 <span class="text-red-500">*</span></label>
                            <select id="p-category" class="form-select" required>
                                <option value="marketing">营销/内容 (文案、自媒体运营)</option>
                                <option value="service" selected>客户服务 (售前、售后、SOP执行)</option>
                                <option value="data">数据分析 (爬虫、BI、报表处理)</option>
                                <option value="design">视觉设计 (AI生图、排版、修图)</option>
                                <option value="dev">研发测试 (代码辅助、自动化测试)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">代表图标 (Lucide Icon名)</label>
                            <input type="text" id="p-icon" class="form-input" value="bot" placeholder="例如: bot, file-text, zap">
                            <div class="form-hint">访问 <a href="https://lucide.dev/icons" target="_blank" class="text-blue-400">lucide.dev</a> 查找图标名称</div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">核心技能标签 <span class="text-red-500">*</span></label>
                        <input type="text" id="p-skills" class="form-input" required placeholder="用逗号分隔，例如：多模态理解, 飞书直连, 知识库检索">
                    </div>

                    <div class="form-group mt-6">
                        <label class="form-label flex justify-between">
                            <span>订阅价格 (每月雇佣薪资) <span class="text-red-500">*</span></span>
                        </label>
                        <div class="flex items-center">
                            <span class="bg-[rgba(255,255,255,0.02)] border border-[rgba(255,255,255,0.05)] border-r-0 px-4 py-3 rounded-l-md text-muted">￥</span>
                            <input type="number" id="p-price" class="form-input" style="border-radius: 0; box-shadow: none;" required min="0" value="199" placeholder="建议价格：99 ~ 499">
                            <span class="bg-[rgba(255,255,255,0.02)] border border-[rgba(255,255,255,0.05)] border-l-0 px-4 py-3 rounded-r-md text-muted">/ 月</span>
                        </div>
                        <div class="form-hint mt-2 text-yellow-500/80"><i data-lucide="info" class="w-3 h-3 inline"></i> 提示：平台将收取 15% 的技术服务与算力抽成。</div>
                    </div>

                    <div class="form-group mt-6">
                        <label class="form-label">详细履历与能力介绍 <span class="text-red-500">*</span></label>
                        <textarea id="p-desc" class="form-textarea" required rows="6" placeholder="详细描述该龙虾员工能帮企业解决什么具体问题，处理流程是怎样的，有什么过往的辉煌战绩..."></textarea>
                    </div>

                    <div class="bg-[rgba(16,185,129,0.05)] border border-[rgba(16,185,129,0.1)] rounded-lg p-4 mb-8 mt-6">
                        <h4 class="text-emerald-400 font-bold mb-2 flex items-center gap-2"><i data-lucide="shield-check" class="w-5 h-5"></i> 发布须知</h4>
                        <ul class="text-sm text-slate-300 space-y-2">
                            <li>1. 上架后将自动进入审核流，管理员将在 2 个工作日内进行业务防幻觉测试。</li>
                            <li>2. 请确保您的 Agent 已经配置好对应的私有知识库或API连接器。</li>
                            <li>3. 严禁发布涉黄、涉政及违背核心价值观的内容，违者封停账号并拉黑IP。</li>
                        </ul>
                    </div>

                    <div class="flex gap-4">
                        <button type="button" class="btn btn-ghost w-1/3" onclick="window.location.href='./marketplace.html'">取消</button>
                        <button type="submit" class="btn btn-primary w-2/3" id="btn-submit">
                            <i data-lucide="send"></i> 提交审核并上架
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="../js/store.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/app.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 权限验证
            Auth.requireAuth();
        });

        async function handlePublish(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i data-lucide="loader-2" class="animate-spin"></i> 提交中...';
            btn.disabled = true;
            lucide.createIcons({root: btn});

            try {
                const user = Auth.getCurrentUser();
                
                // 处理标签串
                const skillStr = document.getElementById('p-skills').value;
                const skillsArr = skillStr.split(/[,，]/).map(s => s.trim()).filter(s => s);

                // 组装数据
                const newSkill = {
                    developerId: user.id,
                    name: document.getElementById('p-name').value,
                    title: document.getElementById('p-title').value,
                    category: document.getElementById('p-category').value,
                    icon: document.getElementById('p-icon').value || 'bot',
                    price: parseFloat(document.getElementById('p-price').value),
                    skills: skillsArr,
                    desc: document.getElementById('p-desc').value,
                    status: 'active', // MVP直接生效，不需要审核过程
                    sales: 0,
                    rating: 5.0
                };

                const res = await Store.add('skills', newSkill);
                
                Toast.show('上架成功！即将跳回市场...', 'success');
                setTimeout(() => {
                    window.location.href = `./skill-detail.html?id=${res.id}`;
                }, 1500);

            } catch (err) {
                Toast.show('提交失败: ' + err.message, 'error');
                btn.innerHTML = originalText;
                btn.disabled = false;
                lucide.createIcons({root: btn});
            }
        }
    </script>
</body>
</html>
